<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- SEO -->
    <title>CineScope — Your Ultimate Entertainment Hub</title>
    <meta name="description" content="Discover trending movies, TV shows, and anime. Track your watchlist, get AI-powered recommendations, and find where to watch — all in one beautiful app." />
    <meta name="keywords" content="movies, tv shows, anime, streaming, watchlist, entertainment, trending, recommendations" />
    <meta name="author" content="CineScope" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CineScope — Your Ultimate Entertainment Hub" />
    <meta property="og:description" content="Discover trending movies, TV shows, and anime. Track your watchlist, get AI-powered recommendations." />
    <meta property="og:site_name" content="CineScope" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="background-color" content="#0a0a0f" />
    
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CineScope" />
    <link rel="apple-touch-icon" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-128x128.png" />
    
    <!-- iOS Splash Screens -->
    <meta name="apple-mobile-web-app-orientations" content="portrait" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Google Drive API -->
    <script src="https://apis.google.com/js/api.js" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
